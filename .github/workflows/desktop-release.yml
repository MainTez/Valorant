name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXUS_APP_URL || 'https://molgarians-premier-hub.vercel.app' }}
      NEXUS_APP_URL: ${{ vars.NEXUS_APP_URL || 'https://molgarians-premier-hub.vercel.app' }}
      CRON_SECRET: desktop-release-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate app
        run: |
          npm test
          npm run lint
          npm run type-check
          npm run build

      - name: Build installer
        shell: pwsh
        run: |
          npx electron-builder --win nsis --x64 --publish never --config.extraMetadata.nexus.appUrl="$env:NEXUS_APP_URL"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Team-Hub-Setup
          path: dist-desktop/Nexus-Team-Hub-Setup.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/Nexus-Team-Hub-Setup.exe
          generate_release_notes: true
